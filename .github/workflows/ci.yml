name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  backend-test:
    name: 后端依赖安装与接口测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装后端依赖
        run: |
          pip install -r requirements.txt
          echo "【后端依赖安装完成】"

      - name: 运行后端接口自动化测试
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
          echo "【后端接口测试完成】"
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: 输出测试失败摘要
        if: failure()
        run: |
          echo "========================================"
          echo "❌ 后端接口测试失败！错误摘要："
          echo "========================================"
          grep -E "(FAILED|ERROR|AssertionError)" test_output.txt || echo "未能提取具体错误行，请查看上方完整日志"
          echo "========================================"
          echo "请检查后端接口实现或测试用例是否正确"
          echo "========================================"

  frontend-build:
    name: 前端依赖安装与构建检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        run: |
          npm ci
          echo "【前端依赖安装完成】"

      - name: 前端构建检查
        run: |
          npm run build 2>&1 | tee build_output.txt
          echo "【前端构建完成】"

      - name: 输出构建失败摘要
        if: failure()
        run: |
          echo "========================================"
          echo "❌ 前端构建失败！错误摘要："
          echo "========================================"
          grep -iE "(error|failed|cannot|Type .* is not assignable)" build_output.txt | head -20 || echo "未能提取具体错误行，请查看上方完整日志"
          echo "========================================"
          echo "请检查前端代码类型错误或构建配置"
          echo "========================================"
